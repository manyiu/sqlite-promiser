# Commit-message driven releases on `main` (Conventional Commits + semantic-release).
#
# npm publish uses Trusted Publishing (OIDC) — no NPM_TOKEN in this workflow.
#   - On npmjs.com → package → Settings → Trusted Publisher: GitHub Actions, this repo, and this
#     workflow filename must match exactly (case-sensitive): `release.yml`.
#   - Requires GitHub-hosted runners and workflow permission `id-token: write` (below).
#   - npm CLI must be >= 11.5.1 for OIDC (bundled with Node 24.x; no separate npm upgrade step).
#   - `@semantic-release/npm` exchanges the GitHub Actions OIDC token for a short-lived publish token.
#
# Local / manual publishes use `npm publish` with your npm account (OTP or token as you configure).
#
# Baseline `v*` git tags keep semantic-release history sane (avoid one giant first automated bump).
#
# If CI fails with `fatal: tag 'vX.Y.Z' already exists`, tags on GitHub may point at commits no longer on
# `main` (e.g. after `git filter-repo` / force-push). semantic-release then tries to recreate the same tag.
# Fix: `git tag -f vX.Y.Z <commit-on-main>` then `git push --force origin refs/tags/vX.Y.Z`.

name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write # OIDC for npm Trusted Publishing (semantic-release → npm)
  issues: write
  pull-requests: write

concurrency:
  group: semantic-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    # Avoid re-running lint/test/release when semantic-release pushes the changelog bump (`[skip ci]`).
    if: ${{ github.event.head_commit == null || !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable Corepack (pnpm version from package.json)
        run: corepack enable pnpm

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          # Pin major 24 (latest 24.x.y on the runner; npm 11.x for Trusted Publishing OIDC).
          node-version: '24'
          cache: 'pnpm'

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      - name: Lint (library)
        run: pnpm --filter sqlite-promiser lint

      - name: Test (library)
        run: pnpm --filter sqlite-promiser test

      - name: Build (library, before npm pack)
        run: pnpm --filter sqlite-promiser build

      - name: Semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec semantic-release
